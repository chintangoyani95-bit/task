<!DOCTYPE html>
<html>
<head>
    <title>Pseudo Class</title>
    <style>
        a:link {
            color: blue;
        }

        a:visited {
            color: purple;
        }

        a:hover {
            color: red;
            font-size: 20px;
        }
        
        a:active {
            color: green;
        }
    </style>
</head>
<body>

    <a href="https://www.google.com" target="_blank">Google</a>

</body>
</html>
