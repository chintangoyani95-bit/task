<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 400px;
  height: 250px;
  border: 2px solid black;
}

.relative {
  position: relative;
  top: 10px;
  left: 50px;
  background: lightgreen;
}

.absolute {
  position: absolute;
  top: 50px;
  right: 20px;
  background: coral;
}

.fixed {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: gold;
  padding: 10px;
}

</style>
</head>
<body>


<div class="container">
  <div class="relative">Relative Box</div>
  <div class="absolute">Absolute Box</div>
</div>

<div class="fixed">Fixed Button</div>

</body>
</html>
